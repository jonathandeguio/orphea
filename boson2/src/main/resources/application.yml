logging:
  level:
    org:
      springframework:
        security: INFO

springdoc:
  api-docs:
    enabled: ${SWAGGER_UI}
  swagger-ui:
    operationsSorter: alpha
    tagsSorter: alpha
    supportedSubmitMethods: [ "get", "put", "post", "delete", "options", "head", "patch", "trace" ]
    doc-expansion: none
    persistAuthorization: true
    tryItOutEnabled: true
    syntaxHighlight:
      theme: arta
