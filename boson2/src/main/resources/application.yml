spring:
#  main:
#    allow-circular-references: true # This needs removing it is a temporary fix
  banner:
    location: classpath:/banner/bosler.txt
  datasource:
    initialization-mode: always
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/boson
    driver-class-name: org.postgresql.Driver
#  datasource:
#    initialization-mode: always
#    platform: postgres
#    username: ${DB_USERNAME}
#    password: ${DB_PASSWORD}
#    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/boson
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
