# =============================================================================
# MoveToData Platform — Stack Snap (service d'artefacts)
# Usage : docker compose -f docker-compose.snap.yml --env-file .env.movetodata up -d
# Prérequis : /dev/fuse disponible sur l'hôte (sudo apt install fuse)
# =============================================================================
version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # Base de données PostgreSQL 16 — Snap
  # ---------------------------------------------------------------------------
  snap-db:
    image: postgres:16-alpine
    container_name: movetodata-snap-db
    environment:
      POSTGRES_DB: ${SNAP_DB_NAME:-postgres}
      POSTGRES_USER: ${SNAP_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SNAP_DB_PASSWORD}
    volumes:
      - ${MOVETODATA_MOUNT_PATH:-/movetodata}/snap/db/data:/var/lib/postgresql/data
      - ${MOVETODATA_MOUNT_PATH:-/movetodata}/snap/db/dbscripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:15432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SNAP_DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - movetodata-snap-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Snap — Service de gestion d'artefacts (Java Spring Boot)
  # Nécessite : /dev/fuse, mode privileged, seccomp désactivé
  # ---------------------------------------------------------------------------
  snap:
    image: movetodata/snap:latest
    container_name: movetodata-snap
    build:
      context: ../snap
      dockerfile: Dockerfile
    privileged: true
    security_opt:
      - label:disable
      - seccomp:unconfined
    depends_on:
      snap-db:
        condition: service_healthy
    environment:
      ALLOWED_ORIGINS: >-
        http://localhost:3000,http://localhost:8080,http://localhost:8082,
        http://localhost:8090,http://snap.movetodata.io:8082,https://snap.movetodata.io:8082
      ARTIFACT_STORE: ${ARTIFACT_STORE:-/movetodata/snap/artifactory}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DB_HOST: snap-db
      DB_PORT: 5432
      DB_USERNAME: ${SNAP_DB_USERNAME:-postgres}
      DB_PASSWORD: ${SNAP_DB_PASSWORD}
      TOKEN_SECRET: ${SNAP_TOKEN_SECRET:-${TOKEN_SECRET}}
      TOKEN_EXPIRATION: ${SNAP_TOKEN_EXPIRATION:-604800000}
      SWAGGER_UI: ${SWAGGER_UI:-false}
      LOG_FILE_PATH: ${SNAP_LOG_FILE_PATH:-/movetodata/snap/logs}
      GITHUB_PAT: ${GITHUB_PAT:-}
      JAVA_OPTS: >-
        -Xms256m
        -Xmx1g
        -XX:+UseG1GC
    command:
      - "java"
      - "-jar"
      - "/app/snap-0.0.1-SNAPSHOT.jar"
    devices:
      - /dev/fuse:/dev/fuse:rw
    volumes:
      - ${MOVETODATA_MOUNT_PATH:-/movetodata}/snap:${MOVETODATA_MOUNT_PATH:-/movetodata}/snap
      - /var/lib/mycontainer:/var/lib/containers
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/endpoints/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - movetodata-snap-net
      - movetodata-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Snap-UI — Frontend React pour Snap
  # ---------------------------------------------------------------------------
  snap-ui:
    image: movetodata/snap-ui:latest
    container_name: movetodata-snap-ui
    build:
      context: ../snap-ui
      dockerfile: Dockerfile
    depends_on:
      snap:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - movetodata-snap-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy — Snap (expose port 8082)
  # ---------------------------------------------------------------------------
  snap-proxy:
    image: nginx:1.25-alpine
    container_name: movetodata-snap-proxy
    depends_on:
      - snap
      - snap-ui
    volumes:
      - ../Unify/snap/reverse_proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${MOVETODATA_MOUNT_PATH:-/movetodata}/ssl/certs:/etc/nginx/ssl:ro
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - movetodata-snap-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  movetodata-snap-net:
    name: movetodata-snap-network
    driver: bridge
  movetodata-network:
    external: true
    name: movetodata-network
