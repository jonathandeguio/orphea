# =============================================================================
# Orphea Platform — Stack principale (Boson + Frontend + PostgreSQL + Redis)
# Usage : docker compose -f docker-compose.core.yml --env-file .env.orphea up -d
# =============================================================================

services:

  boson-db:
    image: postgres:14-alpine
    container_name: orphea-boson-db
    environment:
      POSTGRES_DB: ${BOSON_DB_NAME:-boson}
      POSTGRES_USER: ${BOSON_DB_USERNAME:-orphea}
      POSTGRES_PASSWORD: ${BOSON_DB_PASSWORD}
    volumes:
      - ${ORPHEA_MOUNT_PATH:-/orphea}/postgres/boson:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOSON_DB_USERNAME:-orphea} -d ${BOSON_DB_NAME:-boson}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - orphea-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  orphea-redis:
    image: redis:7-alpine
    container_name: orphea-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ${ORPHEA_MOUNT_PATH:-/orphea}/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orphea-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  boson:
    image: orphea/boson:latest
    container_name: orphea-boson
    build:
      context: ../boson
      dockerfile: Dockerfile
    command:
      - /bin/sh
      - -lc
      - >
        JAR=$$(find /app -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n 1);
        test -n "$$JAR";
        exec java $$JAVA_OPTS -jar "$$JAR"
    depends_on:
      boson-db:
        condition: service_healthy
      orphea-redis:
        condition: service_healthy
    environment:
      DB_USERNAME: ${BOSON_DB_USERNAME:-orphea}
      DB_PASSWORD: ${BOSON_DB_PASSWORD}
      DB_HOST: boson-db
      DB_PORT: 5432
      TOKEN_SECRET: ${TOKEN_SECRET}
      TOKEN_EXPIRATION: ${TOKEN_EXPIRATION:-604800000}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      ORPHEA_MOUNT_PATH: ${ORPHEA_MOUNT_PATH:-/orphea}
      SAML2_SSO_CONFIG: ${SAML2_SSO_CONFIG:-file:/etc/orphea/saml.yml}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      SWAGGER_UI: ${SWAGGER_UI:-false}
      # Mode de stockage : localfs | s3 | gs | hdfs
      BACKING_FS: ${BACKING_FS:-localfs}
      # Répertoire racine pour le stockage local (utilisé si BACKING_FS=localfs)
      LOCAL_FS_DIRECTORY: ${ORPHEA_MOUNT_PATH:-/orphea}
      JAVA_OPTS: >-
        -Xms512m
        -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -Djava.security.egd=file:/dev/./urandom
    volumes:
      - ${ORPHEA_MOUNT_PATH:-/orphea}:${ORPHEA_MOUNT_PATH:-/orphea}
      - /etc/orphea:/etc/orphea:ro
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      # Accepte toute réponse HTTP (200 ou 401) — le serveur est vivant s'il répond
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/endpoints/health | grep -qE '^[2-5]' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - orphea-net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  frontend:
    image: orphea/frontend:latest
    container_name: orphea-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${BASE_URL:-http://localhost:8080}/api
    depends_on:
      boson:
        condition: service_healthy
    volumes:
      - ${ORPHEA_MOUNT_PATH:-/orphea}/frontend/build:/app
      - ${ORPHEA_MOUNT_PATH:-/orphea}/frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - orphea-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  orphea-docs:
    image: orphea/docs:latest
    container_name: orphea-docs
    build:
      context: ../orphea-docs
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - orphea-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  orphea-net:
    name: orphea-network
    driver: bridge
