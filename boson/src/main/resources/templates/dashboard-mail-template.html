<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>MoveToData</title>
    <style>
		body {
			background-color: rgba(239, 241, 244, 0.5);
			height: 100%;
			width: 100%;
		}

		.container {
			background-color: #f4f6fb;
            padding : 50px 100px;
            border-collapse: separate;
            border-spacing: 20px;
		}

		.icon {

		}
		.text {
			padding: 50px;
    		background-color: white;
		}
		.head {
			background-color: #fffbe6;
    		border: 1px solid #ffe58f;
    	    box-sizing: border-box;
		    margin: 0;
		    padding: 6px 12px;
		    color: rgba(0, 0, 0, 0.88);
		    font-size: 14px;
		    line-height: 1.5714285714285714;
		    list-style: none;
		    font-family: "IBM Plex Sans","Helvetica","Arial",sans-serif;
		    word-wrap: break-word;
		    width: auto;
		    display: inline-block;
		}
		.button {
			width: fit-content;
		    height: 32px;
		    font-weight: 400;
		    white-space: nowrap;
		    border: 1px solid transparent;
		    cursor: pointer;
		    transition: all 0.2s cubic-bezier(0.645, 0.045, 0.355, 1);
		    user-select: none;
		    touch-action: manipulation;
		    line-height: 1.5714285714285714;
		    align-items: center;
		    opacity: 1;
		    padding: 0px 10px;
		    border-radius: 3px;
		    width: auto;
		    text-align: center;
		    color: white;
		    background: rgb(41, 160, 124);
		    border-color: green;
		    justify-content: center;
		    font-size: 14px;
		}
		th {

		}





    </style>
</head>
<body>
<table class="container">
    <tr>
        <th style="text-align: center;">
            <div class="icon">
                <a get="_blank" href="#" title="MoveToData Icon">
                    <img alt="MoveToData Icon" height="55" src="https://i.ibb.co/h1JSKYV/short-logo.png" width="50"/>
                </a>
            </div>

        </th>
    </tr>
    <tr>
        <th style="text-align: center;">
            <div class="head">
                Hello, [[${name}]]!
            </div>
        </th>
    </tr>
    <tr>
        <th style="text-align: center;">
            <div class="text">
                [[${data}]]!
            </div>
        </th>
    </tr>
    <tr>
        <th style="text-align: center;">
            <a target="_blank" th:href="${buttonLink}">
                <button class="button">
                    Check it Out!
                </button>
            </a>
        </th>
    </tr>
</table>
</body>
</html>
