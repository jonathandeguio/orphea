[pycodestyle]
exclude = test/plugins/.ropeproject,test/.ropeproject
;select =
ignore = E226,E24,W504,E722,E501,W505
max_line_length = 500
max_doc_length = 72

[flake8]
ignore = E501
max-line-length = 500
extend-ignore =E501,W505,E226,E24,W504,E722

[tool:pytest]
testpaths = test
addopts =
    --cov-report html --cov-report term --junitxml=pytest.xml
    --cov pylsp --cov test
