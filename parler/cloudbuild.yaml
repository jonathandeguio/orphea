# Followed this to create below ci : https://github.com/maximbetin/maxim-cicd
options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # Step 1
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      [
        '-c',
        'docker pull europe-west1-docker.pkg.dev/$PROJECT_ID/orphea-cr/parler:$TAG_NAME || exit 0',
      ]
  # Step 2
  - name: gcr.io/cloud-builders/docker
    args:
      [
        'build',
        '-t',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/orphea-cr/parler:$TAG_NAME',
        '.',
      ]
  # Step 4
  # - name: 'gcr.io/cloud-builders/kubectl'
  #   args:
  #     [
  #       'set',
  #       'image',
  #       'deployment',
  #       'parler',
  #       'parler=europe-west6-docker.pkg.dev/orphea-211/orphea-cr/parler:$TAG_NAME',
  #       '--namespace',
  #       'orphea',
  #     ]
  #   env:
  #     - 'CLOUDSDK_COMPUTE_ZONE=europe-west6-a'
  #     - 'CLOUDSDK_CONTAINER_CLUSTER=orphea-211'
  # Push the image to Google Container Registry with the $TAG_NAME tag
images: ['europe-west1-docker.pkg.dev/$PROJECT_ID/orphea-cr/parler:$TAG_NAME']
timeout: 2400s
