options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # Step 1
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: [
        '-c',
        'docker pull europe-west1-docker.pkg.dev/$PROJECT_ID/movetodata-cr/funnel:$TAG_NAME || exit 0'
    ]
  # Step 2
  - name: gcr.io/cloud-builders/docker
    args: [
        'build',
        '-t',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/movetodata-cr/funnel:$TAG_NAME',
        '.',
        '--build-arg',
        'CACHEBUST=$(date +%s)'
    ]
images: [
    'europe-west1-docker.pkg.dev/$PROJECT_ID/movetodata-cr/funnel:$TAG_NAME'
]
timeout: 2400s
