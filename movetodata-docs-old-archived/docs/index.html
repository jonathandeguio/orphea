<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" href="_media/logo.svg" />
    <title>MoveToData : Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <!-- Theme: Simple Dark -->
    <link rel="stylesheet" href="_media/css/theme-simple-dark.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      const apiHost = location.protocol + "//" + location.host;

      const apiUrl = apiHost + "/api/ping";

      const makeApiCall = async () => {
        // Get token from local storage
        const token = localStorage.getItem("movetodataToken");
        if (!token) {
          window.location.replace(apiHost);
          throw new Error("Unauthorized: No token found in local storage.");
        }

        // Create an headers object
        const headers = new Headers();
        headers.append("Authorization", `Bearer ${token}`);

        // Make the API call
        try {
          const response = await fetch(apiUrl, {
            method: "GET",
            headers: headers,
          });

          if (!response.ok) {
            window.location.replace(apiHost);
            throw new Error(`Unauthorized: ${response.statusText}`);
          }

          const data = await response.json();
          console.log(data);
        } catch (error) {
          console.error(error);
        }
      };

      makeApiCall();

      window.$docsify = {
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        name: "MoveToData Documentation",
        repo: "",

        subMaxLevel: 4,
        // alias: {
        //   ".*/_sidebar.md": "/_sidebar.md",
        // },

        mergeNavbar: true,

        nameLink: {
          "/en/": "#/en/",
          "/fr/": "#/fr/",
          "/": "#/en/",
        },

        // auto2top: true,
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        relativePath: true,
        alias: {
          "/en/_sidebar.md": "/en/_sidebar.md",
          "/fr/_sidebar.md": "/fr/_sidebar.md",
        },

        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "Copied",
        },

        // copyCode: {
        //   buttonText: {
        //     '/fr/'   : 'Copier dans le presse-papier',
        //     '/en/'      : 'Copy to clipboard',
        //     '/'      : 'ddd'
        //   },
        //   errorText: {
        //     '/fr/'   : 'Erreur',
        //     '/en/'      : 'Error'
        //   },
        //   successText: {
        //     '/fr/'   : 'Copié',
        //     '/en/'      : 'Copied'
        //   }
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <!-- Latest v2.x.x -->
    <script src="https://unpkg.com/docsify-copy-code@2"></script>
  </body>
</html>
