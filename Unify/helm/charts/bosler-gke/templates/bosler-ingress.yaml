apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bosler-ingress
  namespace: "{{ .Values.namespace }}"
  annotations:
    kubernetes.io/ingress.global-static-ip-name: bosler
    ingress.gcp.kubernetes.io/pre-shared-cert: bosler-preshared-cert
    kubernetes.io/ingress.allow-http: "true"
    spec.ingressClassName: "gce"
spec:
  rules:
    - host: "{{ .Values.fqdn }}"
    - http:
        paths:
          - path: /api/jupyter/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: callisto
                port:
                  number: 8686
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: boson
                port:
                  number: 8080
          # - path: /bosler-shs/*
          #   pathType: ImplementationSpecific
          #   backend:
          #     service:
          #       name: bosler-spark-history-server
          #       port:
          #         number: 18080
          - path: /lsp/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: parler
                port:
                  number: 8999
          # - path: /docs/*
          #   pathType: ImplementationSpecific
          #   backend:
          #     service:
          #       name: bosler-docs
          #       port:
          #         number: 80
          - path: /learn/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: bosler-docs
                port:
                  number: 80
          # - path: /julia/*
          #   pathType: ImplementationSpecific
          #   backend:
          #     service:
          #       name: boson
          #       port:
          #         number: 58542
          - path: /swagger-ui/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /swagger-ui.html
            pathType: ImplementationSpecific
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /v3/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
