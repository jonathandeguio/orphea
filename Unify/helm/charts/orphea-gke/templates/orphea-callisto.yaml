apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: callisto
  name: callisto
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      name: callisto
  template:
    metadata:
      labels:
        name: callisto
    spec:
      containers:
        - image: "{{ include "orphea-gke.repo_path" . }}callisto:{{ .Values.versions.callisto }}"
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          name: callisto
          ports:
            - containerPort: 8686
          env:
            - name: BASE_URL
              value: "{{ include "orphea-gke.baseUrl" . }}"
            - name: ORPHEA_API
              value: "http://{{ .Values.backend.host }}:8080"
            - name: BUILD_TOKEN
              value: "eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiI3ZGRmN2VhNy1jM2YxLTQ2YWMtOTYzOC00MGQ4OTRlOGYwZWEiLCJpYXQiOjE2ODU1NTU1MTMsImV4cCI6MTY5NzA2ODgwMH0.V06mFQ4n2CVa7Mvy7XNrGGkfrzp7O07oS8DdAavCjnrR3Q6MInrqZ2t277iF8h8O7ICDmf2-n_W1QcHt18DEWw"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: boson-db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: boson-db-password
            - name: DB_HOST
              value: "{{ .Values.backend.dbHost }}"
            - name: DB_PORT
              value: "{{ .Values.backend.dbPort }}"
            - name: HOST
              value: "{{ .Values.backend.host }}"
            - name: JULIA_HOST
              value: "{{ .Values.julia.host }}"              
            - name: JULIA_API_PORT
              value: "{{ .Values.julia.apiPort }}"
            - name: JULIA_PORT
              value: "{{ .Values.julia.gitPort }}"
            - name: GIT_CLONED_PATH
              value: "{{ .Values.backend.orpheaMountPath }}/git/cloned"
            - name: BACKING_FS
              value: "{{ .Values.backend.backingFs }}"
            - name: LOCAL_FS_DIRECTORY
              value: "{{ .Values.backend.localFsDirectory }}"
            - name: HDFS_ENDPOINT
              value: "{{ .Values.backend.hdfsEndpoint }}"              
            - name: GS_BUCKET
              value: "{{ include "orphea-gke.gsBucket" . }}"
            - name: MINIO_ENDPOINT
              value: "{{ .Values.backend.minioEndpoint }}"
            - name: NOTEBOOK_DIR
              value: "{{ .Values.backend.orpheaMountPath }}/git/cloned/"
            - name: NOTEBOOK_TOKEN
              value: "{{ .Values.backend.notebookToken }}" 
            - name: FRACTAL_TEMPLATES_PATH
              value: "/app/FractalTemplates"
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: token-secret
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: minio-username
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: minio-password
            - name: GOOGLE_CLOUD_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: google-cloud-credentials
                  
          volumeMounts:
            - mountPath: "{{ .Values.backend.orpheaMountPath }}"
              name: orphea-nfs-volume
          workingDir: "{{ .Values.backend.orpheaMountPath }}"
      restartPolicy: Always
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: orphea-nfs-volume
          persistentVolumeClaim:
            claimName: orphea-pvc

---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: callisto
  name: callisto
  namespace: {{ .Values.namespace }}
  annotations:
    beta.cloud.google.com/backend-config: '{"default": "orphea-backend-config"}'
spec:
  type: NodePort
  ports:
    - name: callisto
      port: 8686
      targetPort: 8686
  selector:
    name: callisto
status:
  loadBalancer: {}
