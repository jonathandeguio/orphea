kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: movetodata-nfs-pvc
  namespace: {{ .Values.namespace }}
spec:
  storageClassName: "nfs"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

