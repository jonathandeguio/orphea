apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: orphea-docs
  name: orphea-docs
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      name: orphea-docs
  template:
    metadata:
      labels:
        name: orphea-docs
    spec:
      containers:
        - image: "{{ include "orphea-aks.repo_path" . }}orphea-docs:{{ .Values.versions.orpheaDocs }}"
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          name: orphea-docs
          ports:
            - containerPort: 80
      restartPolicy: Always
      imagePullSecrets:
        - name: regcred

---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: orphea-docs
  name: orphea-docs
  namespace: {{ .Values.namespace }}
  annotations:
    beta.cloud.google.com/backend-config: '{"default": "orphea-backend-config"}'
spec:
  type: NodePort
  ports:
    - name: orphea-docs
      port: 80
      targetPort: 80
  selector:
    name: orphea-docs
status:
  loadBalancer: {}
