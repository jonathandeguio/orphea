apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: frontend
  name: frontend
  namespace: movetodata
spec:
  replicas: 1
  selector:
    matchLabels:
      name: frontend
  template:
    metadata:
      labels:
        name: frontend
    spec:
      containers:
        - image: rmalik/movetodata:frontend
          imagePullPolicy: Always
          name: frontend
          ports:
            - containerPort: 80
      restartPolicy: Always
      imagePullSecrets:
        - name: regcred

---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: frontend
  name: frontend
  namespace: movetodata
spec:
  # type: NodePort
  ports:
    - name: frontend
      protocol: TCP
      port: 80
      targetPort: 80
      # nodePort: 80
  selector:
    name: frontend
