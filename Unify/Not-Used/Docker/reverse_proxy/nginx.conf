user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 1024;
}

http {
         server {
            listen 80;
            server_name localhost 127.0.0.1;

            location /api/* {
                proxy_pass          http://boson:8080/api/*;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

            location /lsp/* {
                proxy_pass          http://parler:8999/lsp/*;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

            location /movetodata-shs/* {
                proxy_pass          http://spark-history-server:18080/movetodata-shs/*;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

            location /swagger-ui/* {
                proxy_pass          http://boson:8080/swagger-ui/*;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

            location /swagger-ui.html {
                proxy_pass          http://boson:8080/swagger-ui.html;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

            location /v3 {
                proxy_pass          http://boson:8080/v3;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

            location / {
                proxy_pass          http://frontend:80;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }

        }
}
