apiVersion: v1
kind: PersistentVolume
metadata:
  name: boson-pv
  namespace: movetodata
  labels:
    type: local
spec:
  capacity:
    storage: 1Gi
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/tmp" # this is for movetodata storage which should ideally be in S3

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: boson-pvc
  namespace: movetodata
  labels:
    type: local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeName: boson-pv
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: boson
  name: boson
  namespace: movetodata
spec:
  replicas: 1
  selector:
    matchLabels:
      name: boson
  template:
    metadata:
      labels:
        name: boson
    spec:
      containers:
        - args:
            - java
            - -jar
            - -Dspring.profiles.active=kubernetes
            - /app/boson-0.0.1-SNAPSHOT.jar
          image: europe-west1-docker.pkg.dev/movetodata-334213/movetodata-cr/boson:latest
          imagePullPolicy: Always
          name: boson
          ports:
            - containerPort: 8080
          resources: {}
          env:
            - name: SWAGGER_UI
              value: "true"          
            - name: BASE_URL
              value: "https://dev.movetodata.io"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: boson-db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: boson-db-password
            - name: DB_HOST
              value: "10.90.240.2"
            - name: DB_PORT
              value: "5432"
            - name: JULIA_BASE_PATH
              value: "/root/movetodata/git/remote"
            - name: HOST
              value: "boson"
            - name: GENERATE_CERTIFICATE
              value: "true"
            - name: JULIA_HOST
              value: "julia"              
            - name: JULIA_API_PORT
              value: "58080"
            - name: JULIA_PORT
              value: "58542"
            - name: BACKING_FS
              value: "gs"
            - name: GS_BUCKET
              value: "datasets_collections_septbos22"
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"
            - name : ALLOWED_ORIGINS
              value: http://127.0.0.1:5500,http://127.0.0.1:3000,http://localhost:3000,http://localhost:8080,https://dev.movetodata.io
            - name: TOKEN_EXPIRATION
              value: "4320000000"
            - name: SPARK_PYSPARK_IMAGE
              value: "europe-west1-docker.pkg.dev/movetodata-334213/movetodata-cr/funnel:latest"
            - name: LOAD_SAMPLE_DATA
              value: "true"
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: token-secret
            - name: FRACTAL_TEMPLATES_TOKEN
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: fractal-templates-token
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: minio-username
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: minio-password
            - name: GOOGLE_CLOUD_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: movetodata-secret
                  key: google-cloud-credentials
          volumeMounts:
            - mountPath: /root/movetodata
              name: boson-app-pv
          workingDir: /app
      imagePullSecrets:
        - name: regcred
      restartPolicy: Always
      volumes:
        - name: boson-app-pv
          persistentVolumeClaim:
            claimName: boson-pvc

---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: boson
  name: boson
  namespace: movetodata
  annotations:
    beta.cloud.google.com/backend-config: '{"default": "movetodata-backend-config"}'
spec:
  type: NodePort
  ports:
    - name: boson
      port: 8080
      targetPort: 8080
  selector:
    name: boson
status:
  loadBalancer: {}
