apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orphea-ingress
  namespace: orphea
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    #- host: bnp-secure.orphea.io
    - http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /orphea-shs/
            pathType: Prefix
            backend:
              service:
                name: orphea-spark-history-server
                port:
                  number: 18080
          - path: /lsp/
            pathType: Prefix
            backend:
              service:
                name: parler
                port:
                  number: 8999
          # - path: /julia/
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: boson
          #       port:
          #         number: 58542
          - path: /swagger-ui/
            pathType: Prefix
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /swagger-ui.html
            pathType: Prefix
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /v3/
            pathType: Prefix
            backend:
              service:
                name: boson
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80