apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: movetodata-spark
  namespace: movetodata

spec:
  # type: "Python"
  # pythonVersion: "3"
  # mode: cluster
  image: "europe-west6-docker.pkg.dev/movetodata/movetodata-cr/funnel:latest"
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/7d7b3ce8-9b09-4fd6-9f5f-d1c54ed3f769/mytransform/funnel_datasets.py
  sparkVersion: "3.2.0"
  # hadoopConf:
  #   "fs.s3a.endpoint": "http://minio:9000"
  # sparkConf:
  #   "spark.kubernetes.driver.annotation.sidecar.istio.io/inject": "false"
  #   "spark.kubernetes.executor.annotation.sidecar.istio.io/inject": "false"
  # restartPolicy:
  #   type: OnFailure
  #   onFailureRetries: 3
  #   onFailureRetryInterval: 10
  #   onSubmissionFailureRetries: 5
  #   onSubmissionFailureRetryInterval: 20

  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "512m"
    envSecretKeyRefs:
      MINIO_ACCESS_KEY:
        name: movetodata-secret
        key: minio-username
      MINIO_SECRET_KEY:
        name: movetodata-secret
        key: minio-password
      POSTGRES_USERNAME:
        name: movetodata-secret
        key: boson-db-username
      POSTGRES_PASSWORD:
        name: movetodata-secret
        key: boson-db-password
    # envVars:
    #   POSTGRES_DATABASE: boson
    #   POSTGRES_HOST: boson-db
    #   POSTGRES_PORT: "5432"
    #   JULIA_URL: "http://boson:58542/"
    #   MINIO_S3_ENDPOINT: "http://minio:9000"
    #   REPOSITORY: 7d7b3ce8-9b09-4fd6-9f5f-d1c54ed3f769
    #   BRANCH: master
    #   USER: 286d69fe-c2dd-410f-95c6-ace3ffeb5b7f
    #   SCRIPTPATH: mytransform/funnel_datasets.py
    # below not working for some reason so using envVars
    # env:
    #   - name: POSTGRES_DATABASE
    #     value: boson
    #   - name: POSTGRES_HOST
    #     value: boson-db
    #   - name: POSTGRES_PORT
    #     value: "5432"
    #   - name: JULIA_URL
    #     value: "http://boson:58542/"
    #   - name: S3_ENDPOINT
    #     value: "http://minio:9000"
    labels:
      version: 3.2.0
    serviceAccount: spark
  executor:
    cores: 1
    coreLimit: "1200m"
    memory: "512m"
    labels:
      version: 3.2.0
