apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: movetodata-spark-synchro
  namespace: movetodata

spec:
  type: Java
  mode: cluster
  image: europe-west1-docker.pkg.dev/marbos23/movetodata-cr/synchro:latest
  mainClass: io.movetodata.Synchro
  mainApplicationFile: local:///app/Synchro-0.0.1-SNAPSHOT.jar
  sparkVersion: 3.3.2
  driver:
    # cores: 1
    # coreLimit: 200m
    # memory: 512m
    labels:
      version: 3.1.1
    serviceAccount: spark
    env:
      - name: SPARK_USER
        value: root
      - name: SPARK_APPLICATION_ID
        value: spark-53fe4939492c4e02aacfa135d6786269
      - name: CORES
        value: "1"
      - name: MOVETODATA_MOUNT_PATH
        value: /movetodata
      - name: BACKING_FS
        value: hdfs
      - name: ACCESS_TOKEN
        value: eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiI1YjBmMTBlOS0zYzJlLTRiYWYtYWQ1MS1iZTA1YTcwOGEzMDYiLCJpYXQiOjE2NzgyNzk1MTIsImV4cCI6MTY3ODM2NTkxMn0.HjltA_ACK2dHEXKJZrf9elhqUmwinRgjp97S7UF1LzYCOEThevcDxT9C0TRbbA-g33Q8ubn8ErI1bw8xonsMSg
      - name: SPARK_MASTER
        value: local[*]
      - name: MOVETODATA_API
        value: http://boson:8080
      - name: BRANCH
        value: master
      - name: DB_HOST
        value: boson-db
      - name: HDFS_ENDPOINT
        value: hdfs://movetodata-hdfs-hadoop-hdfs-nn:9000
      - name: DATABASE
        value: kepler
      - name: MEMORY
        value: 512M
      - name: DATASET_ID
        value: 6f2ec338-b594-4b39-8ff4-4fb67207e637
      - name: DB_USERNAME
        valueFrom:
          secretKeyRef:
            key: boson-db-username
            name: movetodata-secret
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            key: boson-db-password
            name: movetodata-secret
  executor:
    # cores: 1
    # coreLimit: 200m
    # memory: 512m
    labels:
      version: 3.1.1
    serviceAccount: spark
    env:
      - name: SPARK_USER
        value: root
      - name: SPARK_APPLICATION_ID
        value: spark-53fe4939492c4e02aacfa135d6786269
      - name: CORES
        value: "1"
      - name: MOVETODATA_MOUNT_PATH
        value: /movetodata
      - name: BACKING_FS
        value: hdfs
      - name: ACCESS_TOKEN
        value: eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiI1YjBmMTBlOS0zYzJlLTRiYWYtYWQ1MS1iZTA1YTcwOGEzMDYiLCJpYXQiOjE2NzgyNzk1MTIsImV4cCI6MTY3ODM2NTkxMn0.HjltA_ACK2dHEXKJZrf9elhqUmwinRgjp97S7UF1LzYCOEThevcDxT9C0TRbbA-g33Q8ubn8ErI1bw8xonsMSg
      - name: SPARK_MASTER
        value: local[*]
      - name: MOVETODATA_API
        value: http://boson:8080
      - name: BRANCH
        value: master
      - name: DB_HOST
        value: boson-db
      - name: HDFS_ENDPOINT
        value: hdfs://movetodata-hdfs-hadoop-hdfs-nn:9000
      - name: DATABASE
        value: kepler
      - name: MEMORY
        value: 512M
      - name: DATASET_ID
        value: 6f2ec338-b594-4b39-8ff4-4fb67207e637
      - name: DB_USERNAME
        valueFrom:
          secretKeyRef:
            key: boson-db-username
            name: movetodata-secret
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            key: boson-db-password
            name: movetodata-secret
  restartPolicy:
    type: Never
