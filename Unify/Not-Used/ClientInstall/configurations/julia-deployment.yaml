apiVersion: v1
kind: PersistentVolume
metadata:
  name: julia-pv
  namespace: orphea
  labels:
    type: local
spec:
  capacity:
    storage: 1Gi
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/orphea" # this is for orphea storage which should ideally be in S3

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: julia-pvc
  namespace: orphea
  labels:
    type: local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeName: julia-pv
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: julia
  name: julia
  namespace: orphea
spec:
  replicas: 1
  selector:
    matchLabels:
      name: julia
  template:
    metadata:
      labels:
        name: julia
    spec:
      containers:
        - args:
            - java
            - -jar
            - -Dspring.profiles.active=kubernetes
            - /app/julia-0.0.1-SNAPSHOT.jar
          image: europe-west1-docker.pkg.dev/orphea-bnp/orphea-cr/julia
          imagePullPolicy: IfNotPresent
          name: julia
          ports:
            - containerPort: 58542
          resources: {}
          env:
            - name: JULIA_HOST
              value: "julia"              
            - name: JULIA_API_PORT
              value: "58080"
            - name: JULIA_PORT
              value: "58542"
            - name: JULIA_BASE_PATH
              value: "/root/orphea/git/remote"
          volumeMounts:
            - mountPath: /root/orphea
              name: julia-pv
          workingDir: /app
      restartPolicy: Always
      volumes:
        - name: julia-pv
          persistentVolumeClaim:
            claimName: julia-pvc

---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: julia
  name: julia
  namespace: orphea
spec:
  type: NodePort
  ports:
    - name: juliaapi
      port: 58080
      targetPort: 58080
    - name: julia
      port: 58542
      targetPort: 58542
  selector:
    name: julia
status:
  loadBalancer: {}
