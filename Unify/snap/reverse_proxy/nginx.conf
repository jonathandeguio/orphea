user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 0;  # Allow unlimited download sizes
    client_body_buffer_size 512k;
    client_header_buffer_size 128k;
    large_client_header_buffers 4 128k;
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;
    client_body_timeout 1200s;
    client_header_timeout 1200s;
    keepalive_timeout 1200s;
    send_timeout 3000s;  # Increase if necessary

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;

    server {
    client_max_body_size 0;  # Allow unlimited download sizes
    client_body_buffer_size 512k;
    client_header_buffer_size 128k;
    large_client_header_buffers 4 128k;
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;
    client_body_timeout 1200s;
    client_header_timeout 1200s;
    keepalive_timeout 1200s;
    send_timeout 3000s;  # Increase if necessary

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

        listen 8082 ssl;
        server_name snap.movetodata.io;

        ssl_certificate /etc/nginx/ssl/fullchain1.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey1.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!3DES;

        location /api/ {
            proxy_pass http://snap:8080/api/;
        }

        location /swagger-ui/ {
            proxy_pass http://snap:8080/swagger-ui/;
        }

        location /swagger-ui.html {
            proxy_pass http://snap:8080/swagger-ui.html;
        }

        location /v3 {
            proxy_pass http://snap:8080/v3;
        }

        location /  {
            proxy_pass http://snap-ui:80;
        }
    }
}
