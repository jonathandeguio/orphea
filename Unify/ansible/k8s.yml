---
- name: Setup Kubernetes Cluster - Master and Worker Nodes
  hosts: k8s
  become: yes
  become_method: sudo
  become_user: root
  vars:
    ansible_become_pass: "movetodata2024"
  tasks:
    - name: Ensure apt-transport-https, ca-certificates, curl, wget, vim are installed
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - wget
          - vim
        state: present
        update_cache: yes

    - name: Create directory for keyrings if not present
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      command: curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.gpg
      register: docker_gpg_download
      retries: 3
      delay: 10

    - name: Add Docker GPG key to keyrings
      command: sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.gpg

    - name: Set permissions for Docker GPG key
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Download Kubernetes GPG Key
      command: curl -fsSLo /etc/apt/kubernetes-archive-keyring.gpg https://dl.k8s.io/apt/doc/apt-key.gpg

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /"
        state: present

    - name: Update apt repository cache
      apt:
        update_cache: yes

    - name: Load necessary kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Enable necessary kernel modules
      shell: |
        modprobe overlay
        modprobe br_netfilter

    - name: Apply sysctl settings
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Install Kubernetes components and containerd
      apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
          - containerd
          - socat
        state: present
        update_cache: yes

    - name: Hold Kubernetes packages from being updated
      apt:
        name: "{{ item }}"
        state: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    - name: Configure containerd
      shell: |
        systemctl stop containerd
        mkdir -p /etc/containerd/
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
        systemctl daemon-reload
        systemctl start containerd
        systemctl enable containerd

- name: Setup Kubernetes Master Node
  hosts: masters
  become: yes
  become_method: sudo
  become_user: root
  vars:
    ansible_become_pass: "movetodata2024"
  tasks:
    - name: Initialize Kubernetes master node
      command: kubeadm init --pod-network-cidr=10.244.0.0/16
      register: master_init_output

    - name: Save Kubernetes config for root user
      shell: |
        mkdir -p /root/.kube
        cp -i /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config

    - name: Install Flannel networking
      command: kubectl apply -f https://raw.githubusercontent.com/coreos/flannel/master/Documentation/kube-flannel.yml
      register: flannel_install_output
      retries: 5
      delay: 15

    - name: Display join command for worker nodes
      debug:
        var: master_init_output.stdout_lines | select('search', 'kubeadm join') | list

- name: Setup Kubernetes Worker Nodes
  hosts: workers
  become: yes
  become_method: sudo
  become_user: root
  vars:
    ansible_become_pass: "movetodata2024"
  tasks:
    - name: Wait for the master to provide the join command
      pause:
        prompt: "Ensure that the master node has provided the 'kubeadm join' command. Press ENTER to continue..."

    - name: Join worker node to the cluster
      shell: "kubeadm join {{ hostvars['movetodata-master1'].master_init_output.stdout_lines | select('search', 'kubeadm join') | list | first }}"
      args:
        warn: false
