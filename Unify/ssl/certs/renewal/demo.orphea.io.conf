# renew_before_expiry = 30 days
version = 0.31.0
archive_dir = /etc/letsencrypt/archive/demo.orphea.io
cert = /etc/letsencrypt/live/demo.orphea.io/cert.pem
privkey = /etc/letsencrypt/live/demo.orphea.io/privkey.pem
chain = /etc/letsencrypt/live/demo.orphea.io/chain.pem
fullchain = /etc/letsencrypt/live/demo.orphea.io/fullchain.pem

# Options used in the renewal process
[renewalparams]
account = d6a3d5016705f6f46f47fccdf5f4ecd5
authenticator = webroot
server = https://acme-v02.api.letsencrypt.org/directory
webroot_path = /letsencrypt,
[[webroot_map]]
aurora.orphea.io = /letsencrypt
bora.orphea.io = /letsencrypt
buran.orphea.io = /letsencrypt
nexus.orphea.io = /letsencrypt
