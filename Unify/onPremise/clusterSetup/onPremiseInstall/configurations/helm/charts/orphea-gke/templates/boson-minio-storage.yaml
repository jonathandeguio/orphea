apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: minio
  name: minio
  namespace: "{{ .Values.namespace }}"
spec:
  replicas: 0
  selector:
    matchLabels:
      name: minio
  template:
    metadata:
      labels:
        name: minio
    spec:
      containers:
        - args:
            - server
            - /storage
          image: minio/minio:latest
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          name: minio
          ports:
            - containerPort: 9000
              hostPort: 9000
          resources: {}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: minio-username
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orphea-secret
                  key: minio-password
          volumeMounts:
            # - mountPath: "{{ .Values.backend.orpheaMountPath }}"
            #   name: orphea-nfs-volume
            - mountPath: "{{ .Values.backend.orpheaMountPath }}"
              name: orphea-local-fs
          workingDir: "{{ .Values.backend.orpheaMountPath }}"
      imagePullSecrets:
        - name: regcred
      restartPolicy: Always
      volumes:
        # - name: orphea-nfs-volume
        #   persistentVolumeClaim:
        #     claimName: orphea-pvc
        - name: orphea-local-fs
          hostPath:
            path: "{{ .Values.backend.orpheaMountPath }}"

---
apiVersion: v1
kind: Service
metadata:
  labels:
    name: minio
  name: minio
  namespace: "{{ .Values.namespace }}"
spec:
  type: NodePort
  ports:
    - name: minio
      port: 9000
      targetPort: 9000
  selector:
    name: minio
status:
  loadBalancer: {}
